name: 🌟 Kirbs Repo Health Check

on:
  push:
    branches: [main, kirbs]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    name: 🛸 Cosmic Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'          # FIX 5: match poyo-notify.yml — one Python version across all workflows

      - name: Install deps
        run: python -m pip install flask --quiet   # FIX 4: python -m pip guarantees the right interpreter

      # ── Syntax Check ─────────────────────────────────────────────────────────
      # FIX 1: replaced `for f in $(find ...)` with `while read -d ''`
      #        • -print0 / -d '' handles filenames with spaces correctly
      #        • -type f excludes directories (the ./Core bug from last run)
      # FIX 2: replaced python3 -c "py_compile.compile('$f', ...)"
      #        • bare string interpolation breaks on spaces, quotes, backslashes
      #        • python -m py_compile "$pyfile" is the safe, canonical form
      - name: 🔍 Syntax Check
        run: |
          FAILED=0
          while IFS= read -r -d '' pyfile; do
            if python -m py_compile "$pyfile" 2>/dev/null; then
              echo "  ✅ $pyfile"
            else
              echo "  ❌ $pyfile — SYNTAX ERROR"
              python -m py_compile "$pyfile"
              FAILED=1
            fi
          done < <(find . -type f -name "*.py" \
                        ! -path "./.git/*"      \
                        ! -path "./venv/*"       \
                        ! -path "./__pycache__/*"\
                        -print0)
          [ "$FAILED" -eq 0 ] || exit 1

      # ── Logic Check ──────────────────────────────────────────────────────────
      # FIX 3: data/kirby_stats.json is runtime data — never committed to git.
      #        A fresh CI checkout will always be missing it, breaking the JSON
      #        block every run. Fix: seed a minimal valid file before the check.
      - name: 🌱 Seed runtime data for logic checks
        run: |
          mkdir -p data
          if [ ! -f data/kirby_stats.json ]; then
            echo '{"tasks":[],"done_today":0,"total_poyos":0,"water_int":25,"level":1,"xp":0,"last_date":""}' \
              > data/kirby_stats.json
            echo "  🌱 Seeded data/kirby_stats.json for CI"
          fi

      - name: 🔍 Logic Check
        run: |
          python3 - <<'PYEOF'
          import sys, json
          issues = []

          def check(filepath, token, present_is_bad, msg):
              try:
                  content = open(filepath).read()
                  found = token in content
                  if present_is_bad and found:
                      issues.append(f"❌ {filepath}: {msg}")
                  elif not present_is_bad and not found:
                      issues.append(f"❌ {filepath}: {msg}")
                  else:
                      print(f"  ✅ {filepath}: OK")
              except FileNotFoundError:
                  issues.append(f"⚠️  {filepath}: file not found")

          check('widget.py',         'sync_github',        True,  "broken sync_github fragment present")
          check('widget.py',         'dream_mix',          True,  "broken dream_mix fragment present")
          check('web_app.py',        'canvas-confetti',    False, "CDN URL fix missing")
          check('web_app.py',        'sanitize',           False, "XSS sanitize() missing")
          check('web_app.py',        'last_date',          False, "daily reset missing")
          check('pomodoro_timer.py', '_session_lock',      False, "double-save lock missing")
          check('pomodoro_timer.py', '_session_saved',     False, "session_saved flag missing")
          check('music_player.py',   'returncode',         False, "infinite skip loop fix missing")
          check('wid.sh',            'eval "$USER_INPUT"', True,  "eval security hole present")
          check('poyo_ultimate.sh',  'timetodime2/',       True,  "broken timetodime2/ paths present")

          try:
              src = open('kirbs.sh').read()
              if src.count('#!/usr/bin/env bash') > 1:
                  issues.append("❌ kirbs.sh: duplicate script detected")
              else:
                  print("  ✅ kirbs.sh: OK")
          except FileNotFoundError:
              issues.append("⚠️  kirbs.sh: file not found")

          try:
              stats = json.load(open('data/kirby_stats.json'))
              for key in ['tasks','done_today','total_poyos','water_int','level','xp']:
                  if key not in stats:
                      issues.append(f"❌ data/kirby_stats.json: missing key '{key}'")
                  else:
                      print(f"  ✅ kirby_stats.json: '{key}' OK")
              if 'total_all_time' in stats:
                  issues.append("❌ data/kirby_stats.json: stale key 'total_all_time' present")
          except Exception as e:
              issues.append(f"⚠️  data/kirby_stats.json: {e}")

          print()
          if issues:
              for i in issues:
                  print(f"::error::{i}")
              print(f"\n🚨 {len(issues)} issue(s) found")
              sys.exit(1)
          else:
              print("✅ All checks passed!")
          PYEOF

      - name: ✅ Done
        run: |
          echo "  ╔══════════════════════════════════════╗"
          echo "  ║  🌟 Cosmic Repo Health: ALL CLEAR    ║"
          echo "  ║       Pilot: avsn17 ✦ kirbs          ║"
          echo "  ╚══════════════════════════════════════╝"
